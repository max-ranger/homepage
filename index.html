<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Max — Software Developer</title>
    <meta name="description" content="Max Ranger — Full-stack developer focusing on web apps & websites. .NET, Vue, Postgres. Available for freelance work." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&family=Fraunces:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('homepage-theme-mode');
          var prefersLight =
            stored === 'light' ||
            (!stored && window.matchMedia('(prefers-color-scheme: light)').matches);
          if (prefersLight) {
            document.documentElement.style.backgroundColor = '#f5f1e6';
          }
        } catch (e) {
          // noop — default dark bg from stylesheet wins
        }
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
