<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Max Ranger — Software Developer</title>
    <meta
      name="description"
      content="Full-stack engineer based in Upper Austria. Available for small/medium side projects: consulting, prototyping, builds, and maintenance."
    />
    <meta name="author" content="Maximilian Ranger" />

    <!-- Open Graph (LinkedIn, iMessage, Slack, Discord, WhatsApp, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ranger.ac/" />
    <meta property="og:site_name" content="ranger.ac" />
    <meta property="og:title" content="Max Ranger — Software Developer" />
    <meta
      property="og:description"
      content="Full-stack engineer based in Upper Austria. Available for small/medium side projects: consulting, prototyping, builds, and maintenance."
    />
    <meta property="og:image" content="https://ranger.ac/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="max@ranger.co.at — software developer" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="de_AT" />

    <!-- Twitter card (used by X and a few other clients that prefer Twitter tags) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Max Ranger — Software Developer" />
    <meta
      name="twitter:description"
      content="Full-stack engineer based in Upper Austria. Side projects, consulting & maintenance."
    />
    <meta name="twitter:image" content="https://ranger.ac/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&family=Fraunces:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('homepage-theme-mode');
          var prefersLight =
            stored === 'light' ||
            (!stored && window.matchMedia('(prefers-color-scheme: light)').matches);
          if (prefersLight) {
            document.documentElement.style.backgroundColor = '#f5f1e6';
          }
        } catch (e) {
          // noop — default dark bg from stylesheet wins
        }
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
